"$schema" = 'https://starship.rs/config-schema.json'

# Clean, minimal prompt inspired by Pure
format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "blue"
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = "dimmed white"
format = "[$branch]($style) "

[git_status]
style = "red"
format = '([$all_status$ahead_behind]($style) )'

[cmd_duration]
style = "yellow"
min_time = 5_000
format = "[$duration]($style) "

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
